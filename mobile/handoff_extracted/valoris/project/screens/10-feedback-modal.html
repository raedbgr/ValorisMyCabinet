<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>MyCabinet — Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EDECE8; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../lib/ios-frame.jsx"></script>
  <script type="text/babel" src="../lib/mc-shared.jsx"></script>

  <script type="text/babel">
    function TagChip({ label, selected }) {
      return (
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '8px 12px', borderRadius: 999,
          background: selected ? T.brand : T.card,
          color: selected ? '#fff' : T.text,
          border: `1px solid ${selected ? T.brand : T.borderS}`,
          fontSize: 13, fontWeight: 600, letterSpacing: -0.1,
          cursor: 'pointer',
        }}>
          {selected && <Icon name="check" size={12} color="#fff" strokeWidth={3}/>}
          {label}
        </div>
      );
    }

    function FeedbackScreen() {
      return (
        <div style={{
          height: '100%', width: '100%', position: 'relative', overflow: 'hidden',
          background: T.bg,
        }}>
          {/* faded chat behind */}
          <div style={{ position: 'absolute', inset: 0, paddingTop: 56, padding: '56px 14px 0' }}>
            {[
              { l: true,  w: '70%', h: 60 },
              { tool: true, w: '60%', h: 38 },
              { l: true,  w: '88%', h: 78 },
              { l: false, w: '50%', h: 44 },
              { l: true,  w: '80%', h: 64 },
            ].map((b, i) => (
              <div key={i} style={{
                width: b.w, height: b.h,
                marginLeft: b.l ? 0 : 'auto', marginBottom: 12,
                background: b.tool ? 'transparent' : b.l ? T.card : T.brand,
                border: b.tool ? `1px dashed ${T.borderS}` : b.l ? `1px solid ${T.border}` : 'none',
                borderRadius: b.l ? '14px 14px 14px 4px' : '14px 14px 4px 14px',
                opacity: 0.5,
              }}/>
            ))}
          </div>

          {/* scrim */}
          <div style={{
            position: 'absolute', inset: 0, background: 'rgba(20, 25, 32, 0.5)',
            backdropFilter: 'blur(2px)',
          }}/>

          {/* modal */}
          <div style={{
            position: 'absolute', left: 16, right: 16, top: '50%',
            transform: 'translateY(-50%)',
            background: T.bg, borderRadius: 20,
            padding: '20px 20px 18px',
            boxShadow: '0 24px 48px -12px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(0,0,0,0.06)',
          }}>
            {/* close */}
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14,
            }}>
              <div style={{
                width: 36, height: 36, borderRadius: 10, background: T.redT,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="thumbsDown" size={18} color={T.red} strokeWidth={1.8}/>
              </div>
              <button style={{
                width: 30, height: 30, borderRadius: '50%', background: T.bgSunk,
                border: 'none', padding: 0, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="x" size={15} color={T.text2} strokeWidth={2.2}/>
              </button>
            </div>

            <h2 style={{
              margin: 0, fontSize: 19, fontWeight: 700, color: T.text,
              letterSpacing: -0.4, lineHeight: 1.25,
            }}>Qu'est‑ce qui n'allait pas ?</h2>
            <p style={{
              margin: '6px 0 14px', fontSize: 13.5, color: T.text2,
              lineHeight: 1.45, letterSpacing: -0.05,
            }}>Votre retour aide à améliorer l'assistant. Plusieurs choix possibles.</p>

            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              <TagChip label="Information incorrecte" selected/>
              <TagChip label="Hors sujet"/>
              <TagChip label="Pas assez clair"/>
              <TagChip label="Document manquant cité" selected/>
              <TagChip label="Ton inadapté"/>
              <TagChip label="Trop long"/>
            </div>

            {/* free text */}
            <div style={{
              marginTop: 14, padding: '12px 14px',
              borderRadius: 10, border: `1px solid ${T.borderS}`,
              background: T.card, minHeight: 78,
            }}>
              <div style={{
                fontSize: 14, color: T.text, letterSpacing: -0.1, lineHeight: 1.45,
              }}>
                L'assistant a cité une facture qui n'existe pas dans mon dossier.
                <span style={{ display: 'inline-block', width: 2, height: 17, background: T.brand, verticalAlign: -4, marginLeft: 1, animation: 'caret 1s steps(2) infinite' }}/>
              </div>
              <div style={{
                marginTop: 6, fontSize: 11, color: T.text3, fontWeight: 500,
                display: 'flex', justifyContent: 'flex-end',
              }}>72 / 500</div>
            </div>

            {/* footer buttons */}
            <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
              <button style={{
                flex: 1, height: 44, borderRadius: 8,
                background: T.card, border: `1px solid ${T.borderS}`,
                color: T.text2, fontSize: 14, fontWeight: 600,
                fontFamily: 'inherit', cursor: 'pointer',
              }}>Annuler</button>
              <button style={{
                flex: 1.4, height: 44, borderRadius: 8,
                background: T.brand, border: 'none',
                color: '#fff', fontSize: 14, fontWeight: 600,
                fontFamily: 'inherit', cursor: 'pointer', letterSpacing: -0.05,
              }}>Envoyer</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice width={390} height={844}>
          <FeedbackScreen />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <style>@keyframes caret { 50% { opacity: 0; } }</style>
</body>
</html>
