<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>MyCabinet — Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EDECE8; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }
  .hscroll { display: flex; gap: 8px; overflow-x: auto; padding: 4px 16px 14px; }
  .hscroll::-webkit-scrollbar { display: none; }
  .hscroll { scrollbar-width: none; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../lib/ios-frame.jsx"></script>
  <script type="text/babel" src="../lib/mc-shared.jsx"></script>

  <script type="text/babel">
    function Chip({ label, active }) {
      return (
        <div style={{
          padding: '7px 13px', borderRadius: 999,
          background: active ? T.brand : T.card,
          color: active ? '#fff' : T.text,
          border: `1px solid ${active ? T.brand : T.border}`,
          fontSize: 13, fontWeight: 600, letterSpacing: -0.1,
          whiteSpace: 'nowrap', cursor: 'pointer',
        }}>{label}</div>
      );
    }

    function DocRow({ name, category, date, color, iconName = 'fileText', processing, last }) {
      return (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '12px 16px',
          borderBottom: last ? 'none' : `1px solid ${T.border}`,
        }}>
          <div style={{
            width: 38, height: 46, borderRadius: 6, background: color.bg,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            position: 'relative', flexShrink: 0,
          }}>
            <Icon name={iconName} size={20} color={color.fg} strokeWidth={1.7}/>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              fontSize: 14, fontWeight: 600, color: T.text,
              letterSpacing: -0.1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{name}</div>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 6, marginTop: 3,
            }}>
              <span style={{
                fontSize: 11, fontWeight: 600, color: color.fg,
                background: color.bg, padding: '1px 7px', borderRadius: 4, letterSpacing: 0.1,
              }}>{category}</span>
              <span style={{ fontSize: 12, color: T.text2, fontWeight: 500 }}>{date}</span>
            </div>
          </div>
          {processing ? (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 5,
              fontSize: 11, color: T.amber, fontWeight: 600,
            }}>
              <div style={{
                width: 12, height: 12, borderRadius: '50%',
                border: `2px solid ${T.amberT}`, borderTopColor: T.amber,
                animation: 'spin 0.9s linear infinite',
              }}/>
              Classement…
            </div>
          ) : (
            <Icon name="check" size={16} color={T.green} strokeWidth={2.4}/>
          )}
        </div>
      );
    }

    function MonthHeader({ children, count }) {
      return (
        <div style={{
          padding: '20px 20px 8px',
          display: 'flex', alignItems: 'baseline', gap: 8,
        }}>
          <div style={{
            fontSize: 12, fontWeight: 600, color: T.text2,
            letterSpacing: 1.2, textTransform: 'uppercase',
          }}>{children}</div>
          <div style={{ fontSize: 12, color: T.text3, fontWeight: 500 }}>{count} pièces</div>
        </div>
      );
    }

    function DocumentsScreen() {
      const cats = [
        { l: 'Tous', a: true },
        { l: 'Factures' },
        { l: 'K-bis' },
        { l: 'Justificatifs' },
        { l: 'Relevés bancaires' },
        { l: 'Autres' },
      ];

      const colorFor = (t) => ({
        facture:  { bg: '#EEF2F7', fg: T.brand },
        releve:   { bg: T.greenT, fg: T.green },
        kbis:     { bg: T.amberT, fg: T.amber },
        autre:    { bg: T.bgSunk, fg: T.text2 },
      }[t]);

      return (
        <div style={{
          height: '100%', width: '100%', background: T.bg,
          display: 'flex', flexDirection: 'column', position: 'relative',
        }}>
          <div className="hide-scroll" style={{
            flex: 1, overflowY: 'auto',
            paddingTop: 56, paddingBottom: 24,
          }}>
            {/* header */}
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '14px 20px 14px',
            }}>
              <h1 style={{
                margin: 0, fontSize: 28, fontWeight: 700,
                letterSpacing: -0.7, color: T.text, lineHeight: 1,
              }}>Documents</h1>
              <div style={{ display: 'flex', gap: 8 }}>
                {['search','filter'].map(n => (
                  <button key={n} style={{
                    width: 38, height: 38, borderRadius: 10, background: T.card,
                    border: `1px solid ${T.border}`, padding: 0, cursor: 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    <Icon name={n} size={18} color={T.text} strokeWidth={1.8}/>
                  </button>
                ))}
              </div>
            </div>

            {/* category chips */}
            <div className="hscroll">
              {cats.map(c => <Chip key={c.l} label={c.l} active={c.a}/>)}
            </div>

            {/* AOÛT 2026 */}
            <MonthHeader count={8}>Août 2026</MonthHeader>
            <div style={{
              background: T.card, borderRadius: 12, border: `1px solid ${T.border}`,
              margin: '0 16px',
            }}>
              <DocRow name="Facture_Boulangerie_08-2026.pdf" category="Facture" date="aujourd'hui"
                      iconName="receipt" color={colorFor('facture')}/>
              <DocRow name="Recu_courses_03-08.jpg" category="Justificatif" date="hier"
                      iconName="image" color={colorFor('autre')} processing/>
              <DocRow name="Releve_LCL_juillet.pdf" category="Relevé bancaire" date="3 août"
                      iconName="fileText" color={colorFor('releve')} last/>
            </div>

            {/* JUILLET 2026 */}
            <MonthHeader count={14}>Juillet 2026</MonthHeader>
            <div style={{
              background: T.card, borderRadius: 12, border: `1px solid ${T.border}`,
              margin: '0 16px',
            }}>
              <DocRow name="Facture_Farine_Moulin.pdf" category="Facture" date="28 juill."
                      iconName="receipt" color={colorFor('facture')}/>
              <DocRow name="Kbis_2026.pdf" category="K-bis" date="22 juill."
                      iconName="file" color={colorFor('kbis')}/>
              <DocRow name="Facture_EDF_juillet.pdf" category="Facture" date="15 juill."
                      iconName="receipt" color={colorFor('facture')} last/>
            </div>
          </div>

          {/* FAB */}
          <button style={{
            position: 'absolute', bottom: 96, right: 20,
            width: 56, height: 56, borderRadius: 28, border: 'none',
            background: T.amber, color: '#fff', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 6px 16px -4px rgba(217,119,6,0.5), 0 2px 4px rgba(0,0,0,0.06)',
          }}>
            <Icon name="plus" size={26} color="#fff" strokeWidth={2.4}/>
          </button>

          <BottomNav active="docs"/>
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice width={390} height={844}>
          <DocumentsScreen />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
