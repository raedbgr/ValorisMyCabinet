<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>MyCabinet — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EDECE8; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../lib/ios-frame.jsx"></script>

  <script type="text/babel">
    // ───────────────────────────────────────────────
    // MyCabinet — Design Tokens
    // ───────────────────────────────────────────────
    const T = {
      bg:      '#FAFAF9',
      card:    '#FFFFFF',
      text:    '#1A1A1A',
      text2:   '#6B6B6B',
      text3:   '#9CA3AF',
      brand:   '#1E3A5F',
      brandH:  '#172E4B',
      amber:   '#D97706',
      green:   '#059669',
      red:     '#DC2626',
      gray:    '#9CA3AF',
      border:  '#EEEDEB',
      borderS: '#E5E5E4',
      borderF: '#1E3A5F',
      tint:    '#F4F3F0',  // hover / press surface
    };

    // ───────────────────────────────────────────────
    // Logo mark — used everywhere
    // ───────────────────────────────────────────────
    function Logo({ size = 56 }) {
      const r = size * 0.24;
      return (
        <div style={{
          width: size, height: size, borderRadius: r, background: T.brand,
          position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 1px 0 rgba(255,255,255,0.5) inset, 0 8px 24px -8px rgba(30,58,95,0.4)',
        }}>
          {/* stacked doc-lines glyph */}
          <svg width={size*0.46} height={size*0.46} viewBox="0 0 24 24" fill="none">
            <rect x="3"  y="4"  width="18" height="2.4" rx="1.2" fill="#fff" opacity="0.95"/>
            <rect x="3"  y="10.8" width="18" height="2.4" rx="1.2" fill="#fff" opacity="0.6"/>
            <rect x="3"  y="17.6" width="11" height="2.4" rx="1.2" fill="#fff" opacity="0.35"/>
          </svg>
          {/* amber proactive dot */}
          <div style={{
            position: 'absolute', top: -2, right: -2,
            width: size*0.24, height: size*0.24, borderRadius: '50%',
            background: T.amber, border: `${size*0.04}px solid ${T.bg}`,
          }} />
        </div>
      );
    }

    // ───────────────────────────────────────────────
    // Input field
    // ───────────────────────────────────────────────
    function Field({ label, type = 'text', value, placeholder, trailing, focused }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <label style={{
            fontSize: 13, fontWeight: 500, color: T.text2, letterSpacing: 0.1,
          }}>{label}</label>
          <div style={{
            height: 48, borderRadius: 8, background: '#fff',
            border: `1px solid ${focused ? T.brand : T.borderS}`,
            boxShadow: focused ? `0 0 0 3px ${T.brand}14` : 'none',
            display: 'flex', alignItems: 'center', padding: '0 14px', gap: 8,
            transition: 'all 0.15s',
          }}>
            <div style={{
              flex: 1, fontSize: 16, color: value ? T.text : T.text3,
              fontWeight: 400, letterSpacing: -0.1,
            }}>{value || placeholder}</div>
            {trailing}
          </div>
        </div>
      );
    }

    // ───────────────────────────────────────────────
    // Login screen
    // ───────────────────────────────────────────────
    function LoginScreen() {
      return (
        <div style={{
          height: '100%', width: '100%', background: T.bg,
          display: 'flex', flexDirection: 'column',
          padding: '64px 24px 0', boxSizing: 'border-box',
          color: T.text,
        }}>
          {/* Logo + wordmark */}
          <div style={{
            paddingTop: 28, paddingBottom: 40,
            display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 14,
          }}>
            <Logo size={48} />
            <div style={{
              fontSize: 20, fontWeight: 700, letterSpacing: -0.4, color: T.text,
            }}>
              MyCabinet
            </div>
          </div>

          {/* Hero copy */}
          <div style={{ marginBottom: 32 }}>
            <h1 style={{
              margin: 0, fontSize: 28, fontWeight: 700,
              letterSpacing: -0.8, lineHeight: 1.15, color: T.text,
            }}>Bienvenue</h1>
            <p style={{
              margin: '8px 0 0', fontSize: 15, lineHeight: 1.45,
              color: T.text2, letterSpacing: -0.1, maxWidth: 280,
            }}>Connectez‑vous à votre espace client</p>
          </div>

          {/* Form */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <Field
              label="Adresse e‑mail"
              value="marie.martin@boulangerie-martin.fr"
              focused={false}
            />
            <Field
              label="Mot de passe"
              type="password"
              value="••••••••••••"
              focused={true}
              trailing={
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={T.text2} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            />

            <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: -4 }}>
              <a style={{
                fontSize: 13, fontWeight: 500, color: T.brand,
                textDecoration: 'none', letterSpacing: -0.1,
              }}>Mot de passe oublié ?</a>
            </div>
          </div>

          {/* Spacer pushes CTA toward thumb zone */}
          <div style={{ flex: 1 }} />

          {/* CTAs — bottom third */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, paddingBottom: 16 }}>
            <button style={{
              height: 52, borderRadius: 8, border: 'none', background: T.brand,
              color: '#fff', fontSize: 16, fontWeight: 600, letterSpacing: -0.1,
              fontFamily: 'inherit', cursor: 'pointer',
              boxShadow: '0 1px 0 rgba(255,255,255,0.12) inset, 0 6px 16px -6px rgba(30,58,95,0.5)',
            }}>
              Se connecter
            </button>

            {/* MFA reassurance */}
            <div style={{
              display: 'flex', alignItems: 'center', gap: 8,
              justifyContent: 'center', paddingTop: 8,
            }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.text3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <span style={{ fontSize: 12, color: T.text3, letterSpacing: -0.05 }}>
                Sécurisé par authentification multi‑facteurs
              </span>
            </div>
          </div>
        </div>
      );
    }

    // ───────────────────────────────────────────────
    // Mount inside iOS frame
    // ───────────────────────────────────────────────
    function App() {
      return (
        <IOSDevice width={390} height={844}>
          <LoginScreen />
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
