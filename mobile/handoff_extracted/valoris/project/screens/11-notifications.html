<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>MyCabinet — Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EDECE8; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../lib/ios-frame.jsx"></script>
  <script type="text/babel" src="../lib/mc-shared.jsx"></script>

  <script type="text/babel">
    function NotifRow({ icon, iconBg, iconFg, title, preview, time, unread }) {
      return (
        <div style={{
          display: 'flex', alignItems: 'flex-start', gap: 12,
          padding: '14px 16px',
          background: unread ? '#FCFBF9' : T.bg,
          borderBottom: `1px solid ${T.border}`,
          position: 'relative', cursor: 'pointer',
        }}>
          <div style={{
            width: 38, height: 38, borderRadius: 10,
            background: iconBg,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
          }}>
            <Icon name={icon} size={18} color={iconFg} strokeWidth={1.9}/>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 8,
            }}>
              <div style={{
                fontSize: 14, fontWeight: unread ? 700 : 600, color: T.text,
                letterSpacing: -0.15, minWidth: 0,
                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
              }}>{title}</div>
              <div style={{ fontSize: 11, color: T.text3, fontWeight: 500, flexShrink: 0 }}>{time}</div>
            </div>
            <div style={{
              fontSize: 13, color: T.text2, fontWeight: 400, lineHeight: 1.4,
              marginTop: 3, letterSpacing: -0.05,
              display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',
              overflow: 'hidden',
            }}>{preview}</div>
          </div>
          {unread && (
            <div style={{
              position: 'absolute', left: 7, top: 22,
              width: 6, height: 6, borderRadius: '50%', background: T.amber,
            }}/>
          )}
        </div>
      );
    }

    function NotificationsScreen() {
      return (
        <div style={{
          height: '100%', width: '100%', background: T.bg,
          display: 'flex', flexDirection: 'column',
        }}>
          <div className="hide-scroll" style={{ flex: 1, overflowY: 'auto', paddingTop: 56 }}>
            {/* header */}
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '14px 20px 12px',
            }}>
              <div>
                <h1 style={{
                  margin: 0, fontSize: 28, fontWeight: 700,
                  letterSpacing: -0.7, color: T.text, lineHeight: 1,
                }}>Notifications</h1>
                <div style={{ fontSize: 12, color: T.text2, fontWeight: 500, marginTop: 4 }}>
                  3 non lues · 24 au total
                </div>
              </div>
              <button style={{
                padding: '8px 12px', height: 36, borderRadius: 8,
                background: T.card, border: `1px solid ${T.border}`,
                fontSize: 12.5, fontWeight: 600, color: T.text2, cursor: 'pointer',
                fontFamily: 'inherit', letterSpacing: -0.05,
              }}>Tout marquer lu</button>
            </div>

            {/* segmented filter */}
            <div style={{ padding: '0 16px 12px', display: 'flex', gap: 6 }}>
              {[
                { l: 'Toutes', a: true, n: 24 },
                { l: 'Échéances', n: 8 },
                { l: 'Documents', n: 6 },
                { l: 'Assistant', n: 4 },
              ].map((f, i) => (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', gap: 5,
                  padding: '6px 11px', borderRadius: 8,
                  background: f.a ? T.brandT : 'transparent',
                  fontSize: 12.5, fontWeight: 600,
                  color: f.a ? T.brand : T.text2,
                  cursor: 'pointer',
                }}>
                  {f.l}
                  <span style={{
                    fontSize: 10, color: f.a ? T.brand : T.text3, fontWeight: 600,
                  }}>{f.n}</span>
                </div>
              ))}
            </div>

            {/* TODAY group */}
            <div style={{
              padding: '8px 16px 6px',
              fontSize: 11, fontWeight: 600, color: T.text2,
              letterSpacing: 1, textTransform: 'uppercase',
            }}>Aujourd'hui</div>
            <div style={{ borderTop: `1px solid ${T.border}`, background: T.card }}>
              <NotifRow
                icon="sparkles" iconBg={T.amberT} iconFg={T.amber}
                title="2 documents manquants pour la TVA"
                preview="L'assistant a détecté qu'il manque les factures du 15 et 22 juillet pour finaliser votre déclaration."
                time="9:24"
                unread
              />
              <NotifRow
                icon="alert" iconBg={T.amberT} iconFg={T.amber}
                title="Échéance TVA dans 5 jours"
                preview="Déclaration TVA — Juillet 2026 — à déposer avant le jeudi 20 août."
                time="8:00"
                unread
              />
              <NotifRow
                icon="check" iconBg={T.greenT} iconFg={T.green}
                title="Document classé"
                preview="Releve_LCL_juillet.pdf a été reconnu comme un relevé bancaire."
                time="6:42"
                unread
              />
            </div>

            {/* THIS WEEK */}
            <div style={{
              padding: '20px 16px 6px',
              fontSize: 11, fontWeight: 600, color: T.text2,
              letterSpacing: 1, textTransform: 'uppercase',
            }}>Cette semaine</div>
            <div style={{ borderTop: `1px solid ${T.border}`, background: T.card }}>
              <NotifRow
                icon="user" iconBg={T.brandT} iconFg={T.brand}
                title="Message du cabinet Dupuis"
                preview="Bonjour Marie, pouvez-vous me transmettre votre K-bis à jour avant fin août ?"
                time="hier"
              />
              <NotifRow
                icon="fileText" iconBg={T.brandT} iconFg={T.brand}
                title="DSN de juillet déposée"
                preview="Votre DSN mensuelle a été télétransmise par le cabinet. Aucune action requise."
                time="lun."
              />
              <NotifRow
                icon="calendar" iconBg={T.bgSunk} iconFg={T.text2}
                title="Nouvelle échéance ajoutée"
                preview="Acompte de CFE — 1er acompte 2026, à régler avant le 15 juin."
                time="dim."
              />
            </div>
          </div>
          <BottomNav active="home"/>
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice width={390} height={844}>
          <NotificationsScreen />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
